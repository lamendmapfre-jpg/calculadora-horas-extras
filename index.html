<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Horas Extras</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#1f2937;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
input,select,button{
    padding:8px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
.resultado{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h2>Calculadora Profesional de Horas Extras</h2>

<div class="grid">

<div>
<label>Salario Mensual</label>
<input type="number" id="salario" value="29000">
</div>

<div>
<label>Fecha</label>
<input type="date" id="fecha">
</div>

<div>
<label>Tipo</label>
<select id="tipo">
<option value="1.35">Extra Regular (35%)</option>
<option value="2">Extra Doble (100%)</option>
</select>
</div>

<div>
<label>Hora Inicio</label>
<input type="time" id="inicio">
</div>

<div>
<label>Hora Fin</label>
<input type="time" id="fin">
</div>

</div>

<br>
<button onclick="calcular()">Calcular</button>
<button onclick="guardar()">Guardar</button>

<div class="resultado" id="resultado"></div>

<h3>Historial</h3>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Horas</th>
<th>Tipo</th>
<th>Monto</th>
<th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

let ultimoCalculo = null;

function horaOrdinaria(salario){
    return salario / (23.83 * 8);
}

function calcularHoras(inicio, fin){
    let i = new Date("1970-01-01T" + inicio);
    let f = new Date("1970-01-01T" + fin);

    if(f < i){
        f.setDate(f.getDate() + 1); // cruza medianoche
    }

    return (f - i) / (1000 * 60 * 60);
}

function formatoRD(v){
    return v.toLocaleString("es-DO",{style:"currency",currency:"DOP"});
}

function calcular(){

    let salario = parseFloat(document.getElementById("salario").value);
    let inicio = document.getElementById("inicio").value;
    let fin = document.getElementById("fin").value;
    let tipo = parseFloat(document.getElementById("tipo").value);

    if(!inicio || !fin){
        alert("Seleccione horas válidas");
        return;
    }

    let horas = calcularHoras(inicio, fin);

    if(horas <= 0){
        alert("Horas inválidas");
        return;
    }

    let valorHora = horaOrdinaria(salario);
    let valorExtra = valorHora * tipo;
    let total = horas * valorExtra;

    ultimoCalculo = {
        horas,
        tipoTexto: tipo === 1.35 ? "Regular" : "Doble",
        total
    };

    document.getElementById("resultado").innerText =
        "Horas: " + horas.toFixed(2) +
        " | Total a pagar: " + formatoRD(total);
}

function guardar(){

    if(!ultimoCalculo){
        alert("Primero calcule");
        return;
    }

    let fecha = document.getElementById("fecha").value;

    if(!fecha){
        alert("Seleccione fecha");
        return;
    }

    let datos = JSON.parse(localStorage.getItem("datos")) || [];

    datos.push({
        id: Date.now(),
        fecha,
        horas: ultimoCalculo.horas,
        tipo: ultimoCalculo.tipoTexto,
        total: ultimoCalculo.total
    });

    localStorage.setItem("datos", JSON.stringify(datos));
    mostrarHistorial();
}

function eliminar(id){
    let datos = JSON.parse(localStorage.getItem("datos")) || [];
    datos = datos.filter(r => r.id !== id);
    localStorage.setItem("datos", JSON.stringify(datos));
    mostrarHistorial();
}

function mostrarHistorial(){

    let datos = JSON.parse(localStorage.getItem("datos")) || [];
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    datos.forEach(r=>{
        tabla.innerHTML += `
        <tr>
        <td>${r.fecha}</td>
        <td>${r.horas.toFixed(2)}</td>
        <td>${r.tipo}</td>
        <td>${formatoRD(r.total)}</td>
        <td><button onclick="eliminar(${r.id})">Eliminar</button></td>
        </tr>`;
    });
}

mostrarHistorial();

</script>

</body>
</html>
