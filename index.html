<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Horas RD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
input,select,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}
button{
background:#2563eb;
color:white;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}
.stat{
background:#334155;
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>
<body>

<h2>Calculadora de Horas - República Dominicana</h2>

<div class="card" id="loginCard">
<h3>Login</h3>
<input type="text" id="usuario" placeholder="Nombre de usuario">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Registrar Jornada</h3>

<input type="date" id="fecha">

<input type="time" id="entrada">
<select id="entradaPeriodo">
<option>AM</option>
<option>PM</option>
</select>

<input type="time" id="salida">
<select id="salidaPeriodo">
<option>AM</option>
<option>PM</option>
</select>

<input type="number" id="pagoHora" placeholder="Pago por hora">

<button onclick="calcular()">Calcular</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<div class="dashboard">
<div class="stat">Horas Normales<br><span id="totalNormales">0</span></div>
<div class="stat">Horas Extras<br><span id="totalExtras">0</span></div>
<div class="stat">Horas Nocturnas<br><span id="totalNocturnas">0</span></div>
<div class="stat">Total a Pagar<br>RD$ <span id="totalPagar">0</span></div>
</div>
</div>

<div class="card">
<h3>Historial</h3>
<select id="filtroMes" onchange="render()">
<option value="">Todos los meses</option>
<option value="01">Enero</option>
<option value="02">Febrero</option>
<option value="03">Marzo</option>
<option value="04">Abril</option>
<option value="05">Mayo</option>
<option value="06">Junio</option>
<option value="07">Julio</option>
<option value="08">Agosto</option>
<option value="09">Septiembre</option>
<option value="10">Octubre</option>
<option value="11">Noviembre</option>
<option value="12">Diciembre</option>
</select>

<button onclick="exportarExcel()">Exportar Excel</button>
<button onclick="exportarPDF()">Generar PDF</button>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Normales</th>
<th>Extras</th>
<th>Nocturnas</th>
<th>Total RD$</th>
<th>Eliminar</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<script>

let usuarioActual=""
let registros=[]

function login(){
usuarioActual=document.getElementById("usuario").value
if(!usuarioActual) return alert("Ingrese usuario")
document.getElementById("loginCard").style.display="none"
document.getElementById("app").style.display="block"
cargar()
}

function convertir24(hora,periodo){
let [h,m]=hora.split(":").map(Number)
if(periodo==="PM" && h<12) h+=12
if(periodo==="AM" && h===12) h=0
return h + m/60
}

function esNocturna(h){
return (h>=22 || h<6)
}

function calcular(){

let fecha=document.getElementById("fecha").value
let entrada=convertir24(
document.getElementById("entrada").value,
document.getElementById("entradaPeriodo").value)

let salida=convertir24(
document.getElementById("salida").value,
document.getElementById("salidaPeriodo").value)

let pago=Number(document.getElementById("pagoHora").value)

if(salida<=entrada) salida+=24

let totalHoras=salida-entrada

let normales=Math.min(8,totalHoras)
let extras=Math.max(0,totalHoras-8)

let nocturnas=0
for(let h=entrada; h<salida; h+=0.25){
if(esNocturna(h%24)) nocturnas+=0.25
}

let total=0
total+=normales*pago
total+=extras*pago*1.35
total+=nocturnas*pago*0.15

registros.push({
fecha,
normales,
extras,
nocturnas,
total
})

guardar()
render()
}

function guardar(){
localStorage.setItem("registros_"+usuarioActual,JSON.stringify(registros))
}

function cargar(){
registros=JSON.parse(localStorage.getItem("registros_"+usuarioActual))||[]
render()
}

function eliminar(i){
registros.splice(i,1)
guardar()
render()
}

function render(){

let filtro=document.getElementById("filtroMes").value
let tabla=document.getElementById("tabla")
tabla.innerHTML=""

let tNorm=0,tExt=0,tNoc=0,tPag=0

registros.forEach((r,i)=>{
if(filtro && r.fecha.split("-")[1]!==filtro) return

tNorm+=r.normales
tExt+=r.extras
tNoc+=r.nocturnas
tPag+=r.total

tabla.innerHTML+=`
<tr>
<td>${new Date(r.fecha).toLocaleDateString("es-DO")}</td>
<td>${r.normales.toFixed(2)}</td>
<td>${r.extras.toFixed(2)}</td>
<td>${r.nocturnas.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td><button onclick="eliminar(${i})">X</button></td>
</tr>`
})

document.getElementById("totalNormales").innerText=tNorm.toFixed(2)
document.getElementById("totalExtras").innerText=tExt.toFixed(2)
document.getElementById("totalNocturnas").innerText=tNoc.toFixed(2)
document.getElementById("totalPagar").innerText=tPag.toFixed(2)

}

function exportarExcel(){

let ws=XLSX.utils.json_to_sheet(registros)
let wb=XLSX.utils.book_new()
XLSX.utils.book_append_sheet(wb,ws,"Historial")
XLSX.writeFile(wb,"Historial_Horas.xlsx")
}

async function exportarPDF(){
const { jsPDF } = window.jspdf
const doc=new jsPDF()

doc.text("Reporte de Horas",20,20)

let y=30
registros.forEach(r=>{
doc.text(
`${new Date(r.fecha).toLocaleDateString("es-DO")} - Total RD$ ${r.total.toFixed(2)}`,
20,y)
y+=10
})

doc.save("Reporte_Horas.pdf")
}

</script>
</body>
</html>
