<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Horas Extras</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#1f2937;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
select,input,button{
    padding:8px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{ background:#1d4ed8; }
.resultado{
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

<h2>Calculadora Horas Extras</h2>

<div class="grid">

<div>
<label>Salario Mensual</label>
<input type="number" id="salario" value="29000">
</div>

<div>
<label>Tipo</label>
<select id="tipo">
<option value="1.35">Extra Regular (35%)</option>
<option value="2">Extra Doble (100%)</option>
</select>
</div>

</div>

<h3>Hora Inicio</h3>
<select id="inicioHora"></select>
<select id="inicioMin"></select>
<select id="inicioAmPm">
<option>AM</option>
<option>PM</option>
</select>

<h3>Hora Fin</h3>
<select id="finHora"></select>
<select id="finMin"></select>
<select id="finAmPm">
<option>AM</option>
<option>PM</option>
</select>

<br><br>
<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

// Generar horas 1-12
for(let i=1;i<=12;i++){
inicioHora.innerHTML+=`<option value="${i}">${i}</option>`;
finHora.innerHTML+=`<option value="${i}">${i}</option>`;
}

// Generar minutos
for(let i=0;i<60;i++){
let m=i.toString().padStart(2,"0");
inicioMin.innerHTML+=`<option value="${m}">${m}</option>`;
finMin.innerHTML+=`<option value="${m}">${m}</option>`;
}

function convertir24(h,m,ampm){
h=parseInt(h);
if(ampm==="PM" && h<12) h+=12;
if(ampm==="AM" && h===12) h=0;
return `${h.toString().padStart(2,"0")}:${m}:00`;
}

function horaOrdinaria(s){
return s/(23.83*8);
}

function calcular(){

let salario=parseFloat(document.getElementById("salario").value);
let tipo=parseFloat(document.getElementById("tipo").value);

let inicio=convertir24(
inicioHora.value,
inicioMin.value,
inicioAmPm.value
);

let fin=convertir24(
finHora.value,
finMin.value,
finAmPm.value
);

let i=new Date("1970-01-01T"+inicio);
let f=new Date("1970-01-01T"+fin);

if(f<i){
f.setDate(f.getDate()+1);
}

let horas=(f-i)/(1000*60*60);

let total=horas*horaOrdinaria(salario)*tipo;

document.getElementById("resultado").innerText=
"Horas trabajadas: "+horas.toFixed(2)+
" | Total: "+total.toLocaleString("es-DO",{style:"currency",currency:"DOP"});
}

</script>

</body>
</html>
