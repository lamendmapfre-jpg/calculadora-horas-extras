<script>

let usuarioActual=""
let registros=[]

function login(){
usuarioActual=document.getElementById("usuario").value
if(!usuarioActual) return alert("Ingrese usuario")

document.getElementById("loginCard").style.display="none"
document.getElementById("app").style.display="block"

cargar()
}

function calcular(){

let fecha=document.getElementById("fecha").value
let entrada=document.getElementById("entrada").value
let salida=document.getElementById("salida").value
let pago=Number(document.getElementById("pagoHora").value)

if(!fecha || !entrada || !salida || !pago){
alert("Complete todos los campos")
return
}

let inicio=new Date(fecha+"T"+entrada)
let fin=new Date(fecha+"T"+salida)

if(fin<=inicio){
fin.setDate(fin.getDate()+1)
}

let horasTotales=(fin-inicio)/3600000

let normales=Math.min(8,horasTotales)
let extras=Math.max(0,horasTotales-8)

let nocturnas=0

let cursor=new Date(inicio)

while(cursor<fin){

let h=cursor.getHours()

if(h>=22 || h<6){
nocturnas+=1/60
}

cursor.setMinutes(cursor.getMinutes()+1)
}

nocturnas=nocturnas*60

let pagoNormales=normales*pago
let pagoExtras=extras*(pago*1.35)
let pagoNocturno=nocturnas*(pago*0.15)

let total=pagoNormales+pagoExtras+pagoNocturno

registros.push({
fecha,
normales,
extras,
nocturnas,
total
})

guardar()
render()
}

function guardar(){
localStorage.setItem("registros_"+usuarioActual,JSON.stringify(registros))
}

function cargar(){
registros=JSON.parse(localStorage.getItem("registros_"+usuarioActual))||[]
render()
}

function eliminar(i){
registros.splice(i,1)
guardar()
render()
}

function render(){

let tabla=document.getElementById("tabla")
tabla.innerHTML=""

let tNorm=0
let tExt=0
let tNoc=0
let tPag=0

registros.forEach((r,i)=>{

tNorm+=r.normales
tExt+=r.extras
tNoc+=r.nocturnas
tPag+=r.total

tabla.innerHTML+=`
<tr>
<td>${new Date(r.fecha).toLocaleDateString("es-DO")}</td>
<td>${r.normales.toFixed(2)}</td>
<td>${r.extras.toFixed(2)}</td>
<td>${r.nocturnas.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td><button onclick="eliminar(${i})">X</button></td>
</tr>
`
})

document.getElementById("totalNormales").innerText=tNorm.toFixed(2)
document.getElementById("totalExtras").innerText=tExt.toFixed(2)
document.getElementById("totalNocturnas").innerText=tNoc.toFixed(2)
document.getElementById("totalPagar").innerText=tPag.toFixed(2)

}

</script>
