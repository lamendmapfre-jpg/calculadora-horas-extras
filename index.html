<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Horas Extras</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.container { background:white; padding:20px; border-radius:8px; max-width:700px; margin:auto; }
h2 { margin-top:0; }
input, select, button { padding:6px; margin:5px 0; width:100%; }
table { width:100%; border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
button { cursor:pointer; }
.total { font-weight:bold; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
<h2>Calculadora de Horas Extras</h2>

<label>Salario Mensual</label>
<input type="number" id="salario" value="29000">

<label>Fecha</label>
<input type="date" id="fecha">

<label>Hora Inicio</label>
<input type="time" id="inicio">

<label>Hora Fin</label>
<input type="time" id="fin">

<label>Tipo de Hora</label>
<select id="tipo">
<option value="1.35">Extra Regular (35%)</option>
<option value="2">Extra Doble (100%)</option>
</select>

<button onclick="calcular()">Calcular y Guardar</button>

<h3>Historial</h3>
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Horas</th>
<th>Tipo</th>
<th>Monto</th>
</tr>
</thead>
<tbody id="historial"></tbody>
</table>

<div class="total" id="total"></div>
<button onclick="limpiarHistorial()">Limpiar Historial</button>

</div>

<script>
function obtenerHoraOrdinaria(salario){
    return salario / (23.83 * 8);
}

function calcularHoras(inicio, fin){
    const inicioDate = new Date("1970-01-01T" + inicio);
    const finDate = new Date("1970-01-01T" + fin);
    let diferencia = (finDate - inicioDate) / (1000 * 60 * 60);
    return diferencia > 0 ? diferencia : 0;
}

function calcular(){
    const salario = parseFloat(document.getElementById("salario").value);
    const fecha = document.getElementById("fecha").value;
    const inicio = document.getElementById("inicio").value;
    const fin = document.getElementById("fin").value;
    const tipo = parseFloat(document.getElementById("tipo").value);

    if(!fecha || !inicio || !fin){
        alert("Complete todos los campos");
        return;
    }

    const horaOrdinaria = obtenerHoraOrdinaria(salario);
    const horasTrabajadas = calcularHoras(inicio, fin);
    const valorHoraExtra = horaOrdinaria * tipo;
    const total = horasTrabajadas * valorHoraExtra;

    const registro = {
        fecha,
        horas: horasTrabajadas.toFixed(2),
        tipo: tipo === 1.35 ? "Regular 35%" : "Doble 100%",
        total: total.toFixed(2)
    };

    let historial = JSON.parse(localStorage.getItem("horasExtras")) || [];
    historial.push(registro);
    localStorage.setItem("horasExtras", JSON.stringify(historial));

    mostrarHistorial();
}

function mostrarHistorial(){
    const historial = JSON.parse(localStorage.getItem("horasExtras")) || [];
    const tabla = document.getElementById("historial");
    tabla.innerHTML = "";
    let sumaTotal = 0;

    historial.forEach(item => {
        sumaTotal += parseFloat(item.total);
        tabla.innerHTML += `
        <tr>
            <td>${item.fecha}</td>
            <td>${item.horas}</td>
            <td>${item.tipo}</td>
            <td>RD$ ${item.total}</td>
        </tr>`;
    });

    document.getElementById("total").innerText = 
        "Total acumulado: RD$ " + sumaTotal.toFixed(2);
}

function limpiarHistorial(){
    localStorage.removeItem("horasExtras");
    mostrarHistorial();
}

mostrarHistorial();
</script>

</body>
</html>
